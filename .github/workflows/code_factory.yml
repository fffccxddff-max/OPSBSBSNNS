name: 24-7 Pure Local AI Coder Bot

on:
  schedule:
    - cron: '0 */5 * * *' # تمدید خودکار هر ۵ ساعت
  workflow_dispatch: # استارت دستی

jobs:
  run-local-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # سیستم کَش برای اینکه دانلود مدل در استارت‌های بعدی ۱ ثانیه طول بکشه
      - name: Cache Hugging Face Models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-qwen-0.5b
          restore-keys: |
            ${{ runner.os }}-hf-

      - name: Install Dependencies
        run: |
          pip install torch transformers accelerate requests

      - name: Run Local Agent Daemon
        env:
          TELEGRAM_TOKEN: "8940324884:AAGZLh7pJ1go9JmWdlMnaoD6j2wWRAnpADY"
        run: python bot_daemon.py
